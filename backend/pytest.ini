[pytest]
# Pytest configuration for backend tests

# Minimum Python version
minversion = 7.0

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers for organizing tests
markers =
    unit: Unit tests for individual endpoints
    integration: Integration tests combining multiple endpoints
    slow: Tests that take significant time
    smoke: Quick smoke tests for all endpoints

# Logging
log_cli = false
log_cli_level = INFO
log_file = test_results.log
log_file_level = DEBUG

# Timeout for individual tests (seconds)
timeout = 30

# Coverage options (when running with pytest-cov)
[coverage:run]
source = .
omit = 
    */test*
    */conftest.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
